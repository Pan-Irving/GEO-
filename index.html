<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GEO 撰文工作台原型</title>
  <script async src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" onload="window.renderIcons && window.renderIcons()"></script>
  <style>
    :root {
      --bg: #f5f7f9;
      --panel: #ffffff;
      --panel-soft: #f9fbfc;
      --line: #dce3e8;
      --text: #172026;
      --muted: #667782;
      --weak: #8a99a3;
      --brand: #0f8b8d;
      --brand-dark: #096a6b;
      --accent: #d95f39;
      --good: #1f8f58;
      --warn: #b97618;
      --danger: #be3a34;
      --blue: #2f6f9f;
      --shadow: 0 12px 28px rgba(28, 44, 52, 0.08);
      --radius: 8px;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(15, 139, 141, 0.08), transparent 280px),
        var(--bg);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 284px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 18px 14px;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(18px);
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 8px 16px;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      color: #fff;
      background: var(--brand);
      border-radius: 8px;
      box-shadow: 0 8px 18px rgba(15, 139, 141, 0.28);
    }

    .brand strong {
      display: block;
      font-size: 15px;
      line-height: 1.25;
    }

    .brand span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .project-card {
      margin: 0 4px 16px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
    }

    .project-card label,
    .section-label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .project-card select {
      width: 100%;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
    }

    .steps {
      display: grid;
      gap: 6px;
      margin: 8px 0 18px;
    }

    .step {
      display: grid;
      grid-template-columns: 30px 1fr auto;
      align-items: center;
      width: 100%;
      min-height: 48px;
      padding: 8px;
      color: var(--muted);
      border-radius: var(--radius);
      background: transparent;
      text-align: left;
    }

    .step:hover {
      background: #edf4f5;
    }

    .step.is-active {
      color: var(--text);
      background: #e4f4f3;
      box-shadow: inset 3px 0 0 var(--brand);
    }

    .step.is-done .step-index {
      color: #fff;
      background: var(--good);
      border-color: var(--good);
    }

    .step-index {
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--weak);
      background: #fff;
      font-size: 12px;
      font-weight: 750;
    }

    .step-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
    }

    .step-desc {
      margin-top: 2px;
      font-size: 12px;
      color: var(--weak);
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--line);
    }

    .step.is-active .status-dot {
      background: var(--brand);
    }

    .step.is-done .status-dot {
      background: var(--good);
    }

    .side-actions {
      display: grid;
      gap: 8px;
      padding: 0 4px;
    }

    .main {
      min-width: 0;
      padding: 20px clamp(16px, 3vw, 34px) 42px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .crumbs {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
    }

    .avatar {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      color: #fff;
      background: #2f6f9f;
      font-size: 12px;
      font-weight: 800;
    }

    .page-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(23px, 3vw, 32px);
      line-height: 1.18;
      letter-spacing: 0;
    }

    .lead {
      max-width: 860px;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .head-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: #fff;
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: #b8c6cd;
      box-shadow: 0 6px 14px rgba(30, 46, 54, 0.08);
    }

    .btn.primary {
      color: #fff;
      background: var(--brand);
      border-color: var(--brand);
    }

    .btn.primary:hover {
      background: var(--brand-dark);
      border-color: var(--brand-dark);
    }

    .btn.ghost {
      background: transparent;
    }

    .btn.warn {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn.icon {
      width: 34px;
      padding: 0;
    }

    .icon-sm {
      width: 16px;
      height: 16px;
      min-width: 16px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.two {
      grid-template-columns: minmax(0, 1fr) 340px;
      align-items: start;
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 800;
    }

    .panel-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .panel-body {
      padding: 16px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .slot-grid,
    .intent-grid,
    .keyword-groups {
      display: grid;
      gap: 12px;
    }

    .slot-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .slot-card,
    .intent-group,
    .keyword-group {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    .slot-card.is-required {
      border-left: 3px solid var(--brand);
    }

    .slot-card.is-optional {
      border-left: 3px solid #aebbc2;
    }

    .slot-head,
    .intent-head,
    .keyword-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .slot-title,
    .intent-title,
    .keyword-title {
      margin: 0;
      font-size: 14px;
      line-height: 1.4;
      font-weight: 800;
    }

    .slot-desc,
    .intent-desc,
    .keyword-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .slot-body,
    .intent-body,
    .keyword-body {
      padding: 12px;
    }

    .mini-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .confirm-row {
      display: grid;
      grid-template-columns: 160px minmax(0, 1fr) 150px 96px 116px;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .confirm-row:last-child {
      border-bottom: 0;
    }

    .confirm-field {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
    }

    details.preview {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    details.preview summary {
      padding: 8px 10px;
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    details.preview .preview-body {
      padding: 0 10px 10px;
      color: var(--text);
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-line;
    }

    .plan-row,
    .brief-row,
    .article-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 11px 12px;
      border-top: 1px solid var(--line);
    }

    .plan-row:first-child,
    .brief-row:first-child,
    .article-row:first-child {
      border-top: 0;
    }

    .plan-row h3,
    .brief-row h3,
    .article-row h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.45;
    }

    .plan-row p,
    .brief-row p,
    .article-row p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .archive-link {
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
    }

    .archive-link:hover {
      text-decoration: underline;
    }

    .article-collapse {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    .article-collapse summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      cursor: pointer;
      list-style: none;
    }

    .article-collapse summary::-webkit-details-marker {
      display: none;
    }

    .filter-bar {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr)) auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #ffffff, #f7fafb);
      box-shadow: 0 8px 18px rgba(28, 44, 52, 0.05);
    }

    .filter-field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .filter-field select,
    .filter-field input {
      width: 100%;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
    }

    .bulk-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      padding: 12px;
      border: 1px solid #b8d7d6;
      border-radius: var(--radius);
      background: #eef8f7;
    }

    .section-stack {
      display: grid;
      gap: 14px;
    }

    .doc-viewer {
      position: fixed;
      inset: 0;
      z-index: 35;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(12, 24, 29, 0.48);
    }

    .doc-viewer.show {
      display: flex;
    }

    .doc-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      width: min(980px, 100%);
      max-height: min(780px, calc(100vh - 44px));
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .doc-body {
      overflow: auto;
      padding: 18px;
      background: #f7fafb;
    }

    .doc-body article {
      max-width: 760px;
      margin: 0 auto;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      line-height: 1.78;
    }

    .permission-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .editor-box {
      width: 100%;
      min-height: 220px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      line-height: 1.7;
      resize: vertical;
    }

    .published-list {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfd;
      overflow: hidden;
    }

    .published-list summary {
      padding: 9px 10px;
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .published-link {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 9px 10px;
      border-top: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
    }

    .published-link span {
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 760px) {
      .filter-bar {
        grid-template-columns: 1fr;
      }
    }

    .stat {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .upload-zone {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      min-height: 154px;
      padding: 18px;
      border: 1.5px dashed #a9bdc5;
      border-radius: var(--radius);
      background: #f8fbfb;
    }

    .upload-zone.dragover {
      border-color: var(--brand);
      background: #edf8f7;
    }

    .upload-copy {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .upload-icon {
      display: grid;
      place-items: center;
      flex: 0 0 42px;
      height: 42px;
      border-radius: 8px;
      color: var(--brand);
      background: #e4f4f3;
    }

    .upload-copy h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: 0;
    }

    .upload-copy p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .file-input {
      display: none;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 0 9px;
      border-radius: 999px;
      background: #eef3f5;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .chip.good {
      color: var(--good);
      background: #e9f7ef;
    }

    .chip.warn {
      color: var(--warn);
      background: #fff3df;
    }

    .chip.danger {
      color: var(--danger);
      background: #fdecea;
    }

    .chip.brand {
      color: var(--brand-dark);
      background: #e4f4f3;
    }

    .file-list,
    .activity-list,
    .group-list {
      display: grid;
      gap: 9px;
    }

    .file-item,
    .activity-item,
    .group-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .file-icon {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      color: var(--blue);
      background: #eaf2f8;
    }

    .file-item strong,
    .activity-item strong,
    .group-item strong {
      display: block;
      font-size: 13px;
      line-height: 1.3;
    }

    .file-item span,
    .activity-item span,
    .group-item span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .intake-table {
      width: 100%;
      border-collapse: collapse;
    }

    .intake-table th,
    .intake-table td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      text-align: left;
      font-size: 13px;
    }

    .intake-table th {
      color: var(--muted);
      background: #f7fafb;
      font-size: 12px;
      font-weight: 800;
    }

    .intake-table tr:last-child td {
      border-bottom: 0;
    }

    .field-input,
    .field-textarea,
    .search-input {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      line-height: 1.45;
    }

    .field-input {
      min-height: 30px;
      padding: 4px 7px;
      font-weight: 650;
    }

    .field-textarea {
      min-height: 64px;
      padding: 7px;
      resize: vertical;
    }

    .field-input:hover,
    .field-input:focus,
    .field-textarea:hover,
    .field-textarea:focus,
    .search-input:focus {
      outline: 0;
      border-color: #b6cbd1;
      background: #fff;
    }

    .source {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .tabs,
    .segmented {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f6f9fa;
    }

    .tab,
    .segmented button {
      min-height: 30px;
      padding: 0 10px;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      font-size: 13px;
      font-weight: 750;
    }

    .tab.is-active,
    .segmented button.is-active {
      color: var(--text);
      background: #fff;
      box-shadow: 0 4px 10px rgba(25, 42, 50, 0.08);
    }

    .planning-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .article-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    .article-card.is-selected {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(15, 139, 141, 0.14);
    }

    .article-card-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .checkbox {
      width: 17px;
      height: 17px;
      accent-color: var(--brand);
    }

    .article-title {
      margin: 0;
      font-size: 14px;
      line-height: 1.45;
    }

    .article-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
    }

    .article-card-body {
      display: grid;
      gap: 9px;
      padding: 12px;
    }

    .kv {
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 10px;
      font-size: 12px;
      line-height: 1.45;
    }

    .kv span:first-child {
      color: var(--muted);
      font-weight: 750;
    }

    .drawer-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 14px;
      align-items: start;
    }

    .brief-list,
    .article-list {

    function bindCurrentViewEvents() {
      if (state.current === "upload") {
        const zone = $("#uploadZone");
        const input = $("#fileInput");
        if (zone) {
          ["dragenter", "dragover"].forEach(eventName => zone.addEventListener(eventName, event => {
            event.preventDefault();
            zone.classList.add("dragover");
          }));
          ["dragleave", "drop"].forEach(eventName => zone.addEventListener(eventName, event => {
            event.preventDefault();
            zone.classList.remove("dragover");
            if (eventName === "drop") showToast("已模拟加入资料池，真实产品中进入解析队列。");
          }));
        }
        if (input) input.addEventListener("change", () => showToast("已模拟选择文件，真实产品中进入解析队列。"));
      }

      if (state.current === "planning") {
        $all("[data-tab]").forEach(tab => tab.addEventListener("click", () => {
          state.planningTab = tab.dataset.tab;
          renderPlanning();
          bindCurrentViewEvents();
          renderIcons();
        }));

        $all(".plan-check").forEach(check => check.addEventListener("change", () => {
          if (check.checked) state.selectedPlanning.add(check.dataset.id);
          else state.selectedPlanning.delete(check.dataset.id);
          renderPlanning();
          bindCurrentViewEvents();
          renderIcons();
        }));

        $all(".edit-plan").forEach(btn => btn.addEventListener("click", () => openPlanModal(btn.dataset.id)));
      }

      if (state.current === "brief") {
        $all(".brief-check").forEach(check => check.addEventListener("change", () => {
          if (check.checked) state.selectedBriefs.add(check.dataset.id);
          else state.selectedBriefs.delete(check.dataset.id);
          showToast(`已更新正文生成选择：${state.selectedBriefs.size} 篇 Brief`);
        }));
      }

      if (state.current === "library") {
        $all("[data-group]").forEach(btn => btn.addEventListener("click", () => {
          state.libraryGroup = btn.dataset.group;
          renderLibrary();
          bindCurrentViewEvents();
          renderIcons();
        }));
      }
    }

    function bindGlobalActionButtons() {
      renderShell();
      bindCurrentViewEvents();

      $("#simulateParse")?.addEventListener("click", () => showToast("资料解析完成：已识别关键词、证据、竞品和禁用词。"));
      $("#nextIntake")?.addEventListener("click", () => completeAndGo("upload", "intake", "已完成资料解析，进入信息确认。"));
      $("#saveIntake")?.addEventListener("click", () => showToast("项目信息修订已保存。"));
      $("#confirmIntake")?.addEventListener("click", () => completeAndGo("intake", "planning", "项目信息已确认，正在生成两份规划。"));
      $("#selectAllPlans")?.addEventListener("click", () => {
        planItems.forEach(item => state.selectedPlanning.add(item.id));
        renderPlanning();
        bindGlobalActionButtons();
        showToast("已全选所有规划文章。");
      });
      $("#confirmPlanning")?.addEventListener("click", () => completeAndGo("planning", "brief", `已选择 ${state.selectedPlanning.size} 篇规划，进入 Brief 生成。`));
      $("#approveSelectedBriefs")?.addEventListener("click", () => {
        state.selectedBriefs.forEach(id => state.approvedBriefs.add(id));
        renderBrief();
        bindGlobalActionButtons();
        showToast(`已确认 ${state.selectedBriefs.size} 篇 Brief。`);
      });
      $("#generateArticles")?.addEventListener("click", () => completeAndGo("brief", "article", "已基于确认 Brief 生成正文。"));
      $("#regenArticle")?.addEventListener("click", () => showToast("已模拟按修改意见重新生成正文。"));
      $("#finalizeArticle")?.addEventListener("click", () => completeAndGo("article", "library", "文章已定稿并归档。"));
      $("#exportMarkdown")?.addEventListener("click", () => showToast("已模拟导出 Markdown 文件包。"));
      $("#exportFlow")?.addEventListener("click", () => showToast("已模拟导出给开发者的流程说明。"));
      $("#saveDraft")?.addEventListener("click", () => showToast("当前项目状态已保存。"));
      renderIcons();
    }

    function openPlanModal(planId) {
      const item = planItems.find(plan => plan.id === planId);
      if (!item) return;
      state.editingPlan = item;
      $("#editTitle").value = item.title;
      $("#editEvidence").value = item.evidence;
      $("#editChannel").value = item.channel;
      $("#modalBackdrop").classList.add("show");
      $("#modalBackdrop").setAttribute("aria-hidden", "false");
      renderIcons();
    }

    function closePlanModal() {
      $("#modalBackdrop").classList.remove("show");
      $("#modalBackdrop").setAttribute("aria-hidden", "true");
      state.editingPlan = null;
    }

    $("#closeModal").addEventListener("click", closePlanModal);
    $("#cancelModal").addEventListener("click", closePlanModal);
    $("#modalBackdrop").addEventListener("click", event => {
      if (event.target.id === "modalBackdrop") closePlanModal();
    });
    $("#saveModal").addEventListener("click", () => {
      if (!state.editingPlan) return;
      state.editingPlan.title = $("#editTitle").value.trim();
      state.editingPlan.evidence = $("#editEvidence").value.trim();
      state.editingPlan.channel = $("#editChannel").value.trim();
      closePlanModal();
      renderPlanning();
      bindGlobalActionButtons();
      showToast("文章规划已更新。");
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closePlanModal();
    });

    renderAllViews();
    goTo("upload");
  </script>

      function renderIntakeInUpload() {
        return `
          <div class="panel" id="intakeConfirmBlock">
            <div class="panel-head">
              <div>
                <div class="panel-title"><i data-lucide="table-properties" class="icon-sm"></i>项目信息自动抽取与确认</div>

      function renderConfirmRow(field) {
        const confirmed = appState.confirmedFields.has(field.id);
        const valueInput = field.long
          ? `<details class="preview"><summary>展开预览</summary><div class="preview-body">${field.value}</div></details><textarea class="field-textarea" data-intake-input="${field.id}" style="margin-top: 8px;">${field.value}</textarea>`
          : `<input class="field-input" data-intake-input="${field.id}" value="${field.value}">`;
        return `
          <div class="confirm-row">
            <div class="confirm-field">${field.label}</div>
            <div>${valueInput}</div>
            <div class="source">${field.source}</div>
            <div>${chip(`置信度 ${field.confidence}`, field.confidence === "高" ? "good" : "warn")}</div>
            <div>
              ${statusChip2(confirmed ? "已确认" : "待确认")}

                <button class="btn icon" data-confirm-field="${field.id}" title="确认此项"><i data-lucide="check" class="icon-sm"></i></button>
              </div>
            </div>
          </div>
        `;
      }

      function renderPlanning() {
        $app("#view-planning").innerHTML = `
          <div class="panel">
            <div class="panel-head">
              <div>
                <div class="panel-title"><i data-lucide="route" class="icon-sm"></i>规划工作区</div>

                { label: "文章类别", key: "planType", options: ["全部", ...articleTypes] },

      function renderMatrixPlan() {
        const filtered = planItems.filter(item => matchesFilters(item, "plan"));
        return `
          <div class="intent-grid">
            ${intentGroups.map(group => {
              const rows = filtered.filter(item => item.cluster === group.id);
              if (!rows.length) return "";
              return `
                <section class="intent-group">
                  <div class="intent-head">
                    <div>
                      <h2 class="intent-title">${group.name}</h2>
                      <div class="intent-desc">${group.desc} · 关键词：${group.keywords.join("、")}</div>
                    </div>
                    ${chip(`${rows.length} 篇规划`, "brand")}
                  </div>
                  <div class="intent-body">
                    ${rows.map(renderPlanRow).join("")}
                  </div>
                </section>
              `;
            }).join("")}
          </div>
        `;
      }

      function renderBreakthroughPlan() {
        const filtered = planItems.filter(item => matchesFilters(item, "plan"));
        const grouped = by(filtered, "keyword");
        return `

            ${Object.entries(grouped).map(([keyword, rows]) => `
              <section class="keyword-group">
                <div class="keyword-head">
                  <div>
                    <h2 class="keyword-title">${keyword}</h2>

                  ${chip("关键词分组", "brand")}
                </div>
                <div class="keyword-body">
                  ${articleTypes.map(type => rows.find(row => row.type === type) || {
                    id: `${keyword}-${type}`,
                    keyword,
                    type,
                    title: `${keyword} - ${type}`,
                    role: "待生成该类型规划。",
                    channel: "待推荐",
                    articleStatus: "未生成文章",
                    used: "未使用",
                    archive: ""
                  }).map(renderPlanRow).join("")}

              </section>
            `).join("")}
          </div>
        `;

            </div>
          </article>
        `;
      }

                  <div class="panel-title"><i data-lucide="newspaper" class="icon-sm"></i>正文审核列表</div>

              <div>
                <h3>${article.type}｜${article.title}</h3>
                <div class="article-meta">

                  ${statusChip2(article.used)}
                  ${chip(article.updated)}
                  ${docButton(article.id)}
                </div>
              </div>
              <span class="head-actions">
                <input class="checkbox" type="checkbox" data-select-article="${article.id}" ${appState.selectedArticles.has(article.id) ? "checked" : ""} aria-label="选择正文">

              </span>

        if (article.used !== "已使用") return "";
        const sites = article.publishedSites || [];
        return `

            <summary>已发布站点清单（${sites.length}）</summary>

                <strong>${site.name}</strong>
                <span>${site.url}</span>
              </a>

      function openDoc(articleId) {
        const article = findArticleLike(articleId);

        ensureDocViewer();
        $app("#docTitle").innerHTML = `<i data-lucide="book-open" class="icon-sm"></i>${article.title}`;
        $app("#docSubtitle").textContent = `${article.keyword} · ${article.type} · ${article.status}`;
        $app("#docBody").innerHTML = `
          <article>
            <h2>${article.title}</h2>
            ${article.body.split("\n").map(line => line ? `<p>${line}</p>` : "").join("")}

        const replaceBtn = $app("#docReplaceBtn");

      function openModal(mode, target) {
        appState.modalMode = mode;
        appState.modalTarget = target;
        const title = $app("#modalTitle");
        const titleInput = $app("#editTitle");
        const bodyInput = $app("#editEvidence");
        const channelInput = $app("#editChannel");
        const titleLabel = $app('label[for="editTitle"]');
        const bodyLabel = $app('label[for="editEvidence"]');
        const channelLabel = $app('label[for="editChannel"]');

        if (mode === "upload") {
          const slot = materialSlots.find(item => item.id === target);
          title.innerHTML = `<i data-lucide="upload" class="icon-sm"></i>上传：${slot.name}`;
          titleLabel.textContent = "资料入口名称";
          bodyLabel.textContent = "本次资料说明";
          channelLabel.textContent = "版本备注";
          titleInput.value = slot.name;
          bodyInput.value = slot.desc;
          channelInput.value = slot.id === "competitor" ? "例如：2026Q3 竞品对比资料" : slot.version;
        }

        if (mode === "plan") {
          const item = planItems.find(row => row.id === target);
          title.innerHTML = `<i data-lucide="edit-3" class="icon-sm"></i>调整文章规划`;
          titleLabel.textContent = "建议标题";
          bodyLabel.textContent = "主要作用";
          channelLabel.textContent = "推荐发布渠道";
          titleInput.value = item.title;
          bodyInput.value = item.role;
          channelInput.value = item.channel;
        }

        if (mode === "brief") {
          const brief = briefs.find(row => row.id === target);
          title.innerHTML = `<i data-lucide="edit-3" class="icon-sm"></i>修改 Brief`;
          titleLabel.textContent = "Brief 标题";
          bodyLabel.textContent = "Brief 摘要 / 修改要求";
          channelLabel.textContent = "审核状态";
          titleInput.value = brief.title;
          bodyInput.value = brief.summary;
          channelInput.value = brief.status;
        }

        if (mode === "strategy") {
          const item = planItems.find(row => row.id === target);
          title.innerHTML = `<i data-lucide="lightbulb" class="icon-sm"></i>补充标题策略`;
          titleLabel.textContent = "当前标题";
          bodyLabel.textContent = "标题策略";
          channelLabel.textContent = "适用范围";
          titleInput.value = item.title;
          bodyInput.value = defaultTitleStrategy(item);
          channelInput.value = `${item.keyword} / ${item.type}`;
        }

        $app("#modalBackdrop").classList.add("show");
        $app("#modalBackdrop").setAttribute("aria-hidden", "false");
        safeIcons();
      }

      function closeModal2() {
        $app("#modalBackdrop").classList.remove("show");
        $app("#modalBackdrop").setAttribute("aria-hidden", "true");
        appState.modalMode = null;
        appState.modalTarget = null;
      }

      function saveModal2() {
        if (!appState.modalMode) return;
        const titleValue = $app("#editTitle").value.trim();
        const bodyValue = $app("#editEvidence").value.trim();
        const channelValue = $app("#editChannel").value.trim();

        if (appState.modalMode === "upload") {
          const slot = materialSlots.find(item => item.id === appState.modalTarget);
          slot.file = `${titleValue}.md`;
          slot.status = "已解析";
          slot.version = channelValue || "新版本";
          toast(`${slot.name} 已上传到指定入口。`);
        }

        if (appState.modalMode === "plan") {
          const item = planItems.find(row => row.id === appState.modalTarget);
          item.title = titleValue;
          item.role = bodyValue;
          item.channel = channelValue;
          toast("文章规划已更新。");
        }

        if (appState.modalMode === "brief") {
          const brief = briefs.find(row => row.id === appState.modalTarget);
          brief.title = titleValue;
          brief.summary = bodyValue;
          brief.status = channelValue || "待确认";
          toast("Brief 已修改。");
        }

        if (appState.modalMode === "strategy") {
          const item = planItems.find(row => row.id === appState.modalTarget);
          item.title = titleValue;
          item.titleStrategy = bodyValue;
          toast("标题策略已保存。");
        }

        closeModal2();
        renderAllAppViews();
        renderAppShell();
      }

      document.addEventListener("click", event => {
        const stepButton = event.target.closest("[data-app-step]");
        if (stepButton) setView(stepButton.dataset.appStep);

        const goButton = event.target.closest("[data-go]");
        if (goButton) setView(goButton.dataset.go);

        const actionButton = event.target.closest("[data-action]");
        if (actionButton) {
          const action = actionButton.dataset.action;
          if (action === "parse") {
            appState.parsed = true;
            appState.done.add("upload");
            renderAllAppViews();
            renderAppShell();
            setTimeout(() => $app("#intakeConfirmBlock")?.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
            toast("资料解析完成，项目信息确认表已出现在下方。");
          }
          if (action === "confirm-upload") {
            if (!appState.parsed) {
              toast("请先解析资料，再确认项目信息。");
            } else {
              completeAndGo("upload", "planning", "项目信息已确认，进入内容规划。");
            }
          }
          if (action === "export-matrix") toast("已模拟导出内容矩阵整体规划。");
          if (action === "export-breakthrough") toast("已模拟导出逐词击破规划。");
          if (action === "to-brief") completeAndGo("planning", "brief", "已选择规划并生成 Brief。");
          if (action === "approve-briefs") toast(`已确认 ${appState.selectedBriefs.size} 篇 Brief。`);
          if (action === "to-article") completeAndGo("brief", "article", "已基于确认 Brief 生成正文。");
          if (action === "regen-article") toast("已模拟按修改意见重写正文。");
          if (action === "bulk-rewrite") toast(`已选择 ${appState.selectedArticles.size} 篇正文，正在统一按意见重写。`);
          if (action === "to-library") completeAndGo("article", "library", "正文已定稿并归档。");
          if (action === "export-markdown") toast("已模拟导出 Markdown 文件包。");
          if (action === "submit-comment") toast("修改意见已提交。");
          if (action === "confirm-selected-rewrites") {
            rewrittenArticles.forEach(item => {
              if (item.status === "改写待确认") item.status = "改写已确认";
            });
            renderAllAppViews();
            renderAppShell();
            toast("已确认当前筛选范围内的改写稿。");
          }
          if (action === "export-rewrites") toast("已模拟导出改写稿清单。");
        }

        const viewDocButton = event.target.closest("[data-view-doc]");
        if (viewDocButton) {
          event.preventDefault();
          openDoc(viewDocButton.dataset.viewDoc);
        }

        if (event.target.closest("[data-close-doc]")) {
          closeDoc();
        }

        if (event.target.closest("[data-replace-doc]")) {
          if (appState.isAdmin) toast("已进入管理员文章替换流程。");
          else toast("当前账号不是管理员，不能替换文章。");
        }

        const uploadButton = event.target.closest("[data-upload-slot]");
        if (uploadButton) openModal("upload", uploadButton.dataset.uploadSlot);

        const confirmButton = event.target.closest("[data-confirm-field]");
        if (confirmButton) {
          const fieldId = confirmButton.dataset.confirmField;
          const input = $app(`[data-intake-input="${fieldId}"]`);
          const field = intakeFields.find(item => item.id === fieldId);
          if (input && field) field.value = input.value;
          appState.confirmedFields.add(fieldId);
          renderAllAppViews();
          renderAppShell();
          toast("该项已手动确认。");
        }

        const tabButton = event.target.closest("[data-plan-tab]");
        if (tabButton) {
          appState.planTab = tabButton.dataset.planTab;
          renderAllAppViews();
          renderAppShell();
        }

        const planEdit = event.target.closest("[data-edit-plan]");
        if (planEdit) openModal("plan", planEdit.dataset.editPlan);

        const briefEdit = event.target.closest("[data-edit-brief]");
        if (briefEdit) openModal("brief", briefEdit.dataset.editBrief);

        const titleStrategy = event.target.closest("[data-title-strategy]");
        if (titleStrategy) openModal("strategy", titleStrategy.dataset.titleStrategy);

        const libraryGroup = event.target.closest("[data-library-group]");
        if (libraryGroup) {
          appState.libraryGroup = libraryGroup.dataset.libraryGroup;
          renderAllAppViews();
          renderAppShell();
        }

        const rewriteGroup = event.target.closest("[data-rewrite-group]");
        if (rewriteGroup) {
          appState.rewriteGroup = rewriteGroup.dataset.rewriteGroup;
          renderAllAppViews();
          renderAppShell();
        }

        const confirmRewrite = event.target.closest("[data-confirm-rewrite]");
        if (confirmRewrite) {
          const item = rewrittenArticles.find(row => row.id === confirmRewrite.dataset.confirmRewrite);
          if (item) {
            item.status = "改写已确认";
            renderAllAppViews();
            renderAppShell();
            toast("改写稿已确认。");
          }
        }

        const libraryRewrite = event.target.closest("[data-library-rewrite]");
        if (libraryRewrite) {
          const source = findArticleLike(libraryRewrite.dataset.libraryRewrite);
          if (source) {
            const id = `r${rewrittenArticles.length + 1}`;
            rewrittenArticles.unshift({
              id,
              originId: source.originId || source.id,
              keyword: source.keyword,
              type: source.type,
              title: `${source.keyword}：同类主题的新版改写标题 ${rewrittenArticles.length + 1}`,
              status: "改写待审核",
              used: "未使用",
              updated: "刚刚生成",
              publishedSites: [],
              rewriteNote: "从定稿归档页发起改写，沿用关键词和文章类型，但要求标题角度、结构和内容展开不同。",
              body: `这是基于《${source.title}》生成的改写稿。它保留相同搜索意图与推荐边界，但更换标题策略、结构顺序和论证角度，适合再次发布同类型文章。`
            });
            renderAllAppViews();
            renderAppShell();
            toast("已生成改写稿，并加入改写文章管理。");
          }
        }

        const resetFilter = event.target.closest("[data-reset-filter]");
        if (resetFilter) {
          const scope = resetFilter.dataset.resetFilter;
          Object.keys(appState.filters).forEach(key => {
            if (key.startsWith(scope)) appState.filters[key] = "全部";
          });
          renderAllAppViews();
          renderAppShell();
        }

        const saveArticle = event.target.closest("[data-save-article]");
        if (saveArticle) {
          const article = articles.find(item => item.id === saveArticle.dataset.saveArticle);
          const input = $app(`[data-article-body="${saveArticle.dataset.saveArticle}"]`);
          if (article && input) {
            article.body = input.value;
            article.updated = "刚刚保存";
            renderAllAppViews();
            renderAppShell();
            toast("正文修改已保存。");
          }
        }

        const rewriteSingle = event.target.closest("[data-rewrite-single]");
        if (rewriteSingle) {
          const id = rewriteSingle.dataset.rewriteSingle;
          const comment = $app(`[data-single-comment="${id}"]`)?.value || "未填写单篇意见";
          toast(`已按单篇意见重新生成：${comment.slice(0, 24)}`);
        }
      });

      document.addEventListener("change", event => {
        const planCheck = event.target.closest("[data-select-plan]");
        if (planCheck) {
          if (planCheck.checked) appState.selectedPlanning.add(planCheck.dataset.selectPlan);
          else appState.selectedPlanning.delete(planCheck.dataset.selectPlan);
        }

        const briefCheck = event.target.closest("[data-select-brief]");
        if (briefCheck) {
          if (briefCheck.checked) appState.selectedBriefs.add(briefCheck.dataset.selectBrief);
          else appState.selectedBriefs.delete(briefCheck.dataset.selectBrief);
        }

        const articleCheck = event.target.closest("[data-select-article]");
        if (articleCheck) {
          if (articleCheck.checked) appState.selectedArticles.add(articleCheck.dataset.selectArticle);
          else appState.selectedArticles.delete(articleCheck.dataset.selectArticle);
          renderAllAppViews();
          renderAppShell();
        }

        const filterInput = event.target.closest("[data-filter-key]");
        if (filterInput) {
          appState.filters[filterInput.dataset.filterKey] = filterInput.value;
          renderAllAppViews();
          renderAppShell();
        }
      });

      $app("#closeModal").addEventListener("click", closeModal2);
      $app("#cancelModal").addEventListener("click", closeModal2);
      $app("#saveModal").addEventListener("click", saveModal2);

      renderAllAppViews();
      setView("dashboard");
    })();
  </script>
</body>
</html>
